# CI for the copilot agent.
#
# The main OpenEMR fork's PHP CI lives elsewhere (upstream inherits its
# own). These jobs scope to the ``agent/`` service and cover the six
# required stages: build, lint (lint + typecheck), test, coverage,
# dependency audit, and security scan. Everything runs against in-memory
# SQLite; no Postgres/OpenEMR needed.
#
# Secrets NEVER live in this file — ANTHROPIC_API_KEY (needed for the
# @pytest.mark.llm eval cases) is set as a masked GitLab CI variable.
# Absent, those cases skip and the suite still passes.
#
# Job/stage map:
#   build     agent:build          venv + editable install + import smoke
#   lint      agent:lint           ruff (lint + format check)
#             agent:typecheck      mypy --strict over copilot/
#   test      agent:tests          pytest + the BLOCKING eval gate (PR-blocking)
#             agent:phi            frozen phi_check over a generated corpus (D34)
#   coverage  agent:coverage       pytest-cov + Cobertura report
#   audit     agent:deps-audit     pip-audit over the resolved environment
#   security  agent:security-scan  bandit static security scan
#
# Only agent:tests and agent:phi are allowed to block on a quality regression;
# the audit and scan jobs report but do not gate (advisory), so a fresh upstream
# CVE advisory cannot wedge unrelated PRs. The eval gate stays PR-blocking, and
# a PHI leak in captured output is never advisory.

stages:
  - build
  - lint
  - test
  - coverage
  - audit
  - security

variables:
  PIP_DISABLE_PIP_VERSION_CHECK: "1"
  PYTHONDONTWRITEBYTECODE: "1"
  PYTHONUNBUFFERED: "1"
  UV_CACHE_DIR: "${CI_PROJECT_DIR}/.uv-cache"
  UV_VERSION: "0.11.8"

# Shared setup: every job builds (or restores) the same agent/.venv keyed on
# agent/pyproject.toml, so the install cost is paid once and reused.
.agent-base:
  image: python:3.12-slim
  needs: []
  # Only run when agent/ changes — the OpenEMR PHP monolith churns
  # constantly and doesn't need these jobs every push.
  rules:
    - changes:
        - agent/**/*
        - .gitlab-ci.yml
  cache:
    key:
      files: ["agent/pyproject.toml"]
    paths:
      - "${UV_CACHE_DIR}"
      - "agent/.venv"
  before_script:
    - pip install "uv==${UV_VERSION}"
    - cd agent
    - test -d .venv || uv venv --python 3.12 .venv
    - source .venv/bin/activate
    - uv pip install -e '.[dev]'
  interruptible: true

# --- build ------------------------------------------------------------------

# Proves the package actually builds and imports from a clean resolve — a
# broken dependency pin or a syntax error fails here, before the slower jobs.
agent:build:
  extends: .agent-base
  stage: build
  script:
    - uv build --wheel --out-dir dist
    - python -c "import copilot; print('copilot imports OK')"
    - python -m compileall -q copilot evals
  artifacts:
    paths:
      - agent/dist/
    expire_in: 7 days

# --- lint / typecheck -------------------------------------------------------

# `ruff format --check` is deliberately NOT run: 34 pre-existing files under
# tests/ are unformatted, so enabling it would land this pipeline red on day
# one. Run `ruff format` across agent/ in a dedicated formatting-only commit,
# then add `- ruff format --check copilot evals tests` here.
agent:lint:
  extends: .agent-base
  stage: lint
  script:
    - ruff check copilot evals tests

agent:typecheck:
  extends: .agent-base
  stage: lint
  script:
    - mypy copilot

# --- test -------------------------------------------------------------------

agent:tests:
  extends: .agent-base
  stage: test
  script:
    - pytest -q --junitxml=../pytest.xml
    # Blocking eval gate (F10): LLM-free rubric gate over the golden set.
    # Exits nonzero when the aggregate OR any of the five rubric categories
    # drops below the absolute pass threshold (min_pass_rate) or regresses
    # >5% relative to the committed baseline (agent/evals/gate_baseline.json),
    # failing this CI job — the server-side backstop for the local pre-push
    # hook. Keep this job PR-blocking.
    - python evals/gate.py --out ../eval-gate.json
  artifacts:
    when: always
    paths:
      - eval-gate.json
    reports:
      junit: pytest.xml
    expire_in: 7 days

# --- privacy / PHI ----------------------------------------------------------

# Spec D34 ("Privacy … verify it in CI with a PHI-detection check"). Runs the
# frozen checker at .swarm-loop/acceptance/phi_check.py — RUN, never edited.
#
# THE VACUOUS-PASS PROBLEM, HANDLED: phi_check scans captured OUTPUT under
# agent/{artifacts,var/capture,logs}. In CI those are empty, and phi_check
# honestly prints 0 for an empty corpus — a pass that proves nothing. So this
# job GENERATES a real corpus first: `gate.py --write-phi-corpus` emits the eval
# gate's live-tier chat log lines AND real telemetry from all five lifecycle
# event families (doc.ingest, extraction.run, guideline.retrieve, worker.handoff,
# verification.result), each line the product of the real copilot scrub layers
# (copilot.rag.deidentify + PatientPseudonymizer) over a PHI-bearing probe.
# Verified to bite: neutering deidentify to an identity function turns this
# corpus from 0 to dozens of detected occurrences across the chat egress and the
# lifecycle families, failing this job. The `test -s` guard fails the job if
# the corpus is ever empty, so the scan can never silently degrade back to
# vacuous.
#
# SCOPE — the corpus now spans the chat/RAG scrub egress AND the five lifecycle
# event families (via evals/lifecycle_phi_corpus.py, which drives each family's
# real span/event emission through the real scrub layers), so phi_check no
# longer warns that families are absent. Known limit: phi_check has no
# bare-integer detector (deliberately — it would flag latency/token counts), so
# an UNpseudonymized patient_id reaching telemetry would slip the free-text scan;
# the PatientPseudonymizer is exercised, but the scanner-visible bite is the
# deidentify free-text path. Any phi_check stderr is still echoed below.
#
# phi_check's exit-code contract: 0 + a bare number = a real measurement (so
# exit 0 is NOT sufficient — the NUMBER is the verdict); 2 = usage error; 3 =
# environment error / the scanner's own anti-vacuous self-proof failed.
agent:phi:
  extends: .agent-base
  stage: test
  script:
    - python evals/gate.py --write-phi-corpus ../phi-corpus/live_chat_logs.jsonl
    # A vacuous (empty) corpus must fail the job, never score a silent 0.
    - test -s ../phi-corpus/live_chat_logs.jsonl
    - |
      export PHI_SCAN_CORPUS="${CI_PROJECT_DIR}/phi-corpus:${CI_PROJECT_DIR}/agent/artifacts"
      if ! python ../.swarm-loop/acceptance/phi_check.py > ../phi-check.out 2> ../phi-check.err; then
        echo "phi_check could not measure (exit 2 = usage, 3 = env error / self-proof failed):"
        cat ../phi-check.err
        exit 1
      fi
      # Surface the corpus-completeness WARNING loudly — a partial corpus must
      # not read as a clean bill of health.
      cat ../phi-check.err
      leaks="$(tail -n 1 ../phi-check.out)"
      echo "phi_check: ${leaks} PHI occurrence(s) in the captured corpus"
      if [ "${leaks}" != "0" ]; then
        echo "BLOCKED — PHI leaked into captured output; the de-identification path regressed."
        exit 1
      fi
  artifacts:
    when: always
    paths:
      - phi-corpus/
      - phi-check.out
      - phi-check.err
    expire_in: 7 days

# --- coverage ---------------------------------------------------------------

agent:coverage:
  extends: .agent-base
  stage: coverage
  script:
    - pytest -q --cov=copilot --cov-report=term --cov-report=xml:../coverage.xml
  coverage: '/^TOTAL\s+\d+\s+\d+\s+(\d+(?:\.\d+)?)%/'
  artifacts:
    when: always
    reports:
      coverage_report:
        coverage_format: cobertura
        path: coverage.xml
    expire_in: 7 days

# --- dependency audit -------------------------------------------------------

# Audits the RESOLVED environment (not just the manifest) against the PyPI
# advisory DB. Advisory: a newly-published upstream CVE must not wedge every
# unrelated PR, so this reports without blocking. Review the job log/artifact.
agent:deps-audit:
  extends: .agent-base
  stage: audit
  allow_failure: true
  script:
    - uv pip install "pip-audit==2.9.0"
    - pip-audit --strict --progress-spinner=off --format=json --output=../pip-audit.json
    - pip-audit --strict --progress-spinner=off
  artifacts:
    when: always
    paths:
      - pip-audit.json
    expire_in: 7 days

# --- security scan ----------------------------------------------------------

# Static security scan of our own source (not deps). Medium+ severity AND
# medium+ confidence only, to keep the signal-to-noise workable. Advisory for
# now — flip allow_failure to false once the findings baseline is at zero.
agent:security-scan:
  extends: .agent-base
  stage: security
  allow_failure: true
  script:
    - uv pip install "bandit==1.8.6"
    - bandit -r copilot -ll -ii -f json -o ../bandit.json || true
    - bandit -r copilot -ll -ii
  artifacts:
    when: always
    paths:
      - bandit.json
    expire_in: 7 days
