<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="color-scheme" content="light dark" />
    <link
      rel="icon"
      href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Crect width='32' height='32' fill='%23175E77'/%3E%3Ctext x='16' y='23' font-family='Georgia,serif' font-size='20' font-weight='700' fill='%23F2F7F9' text-anchor='middle'%3ER%3C/text%3E%3C/svg%3E"
    />
    <title>Rounds — Clinical Co-Pilot</title>
    <script>
      // Apply the persisted theme before first paint to avoid a flash.
      (function () {
        try {
          var t = localStorage.getItem('rounds-theme');
          if (t === 'light' || t === 'dark') {
            document.documentElement.dataset.theme = t;
          }
        } catch (e) {
          /* storage unavailable — fall back to system preference */
        }
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
