components:
  schemas:
    AdvanceRequest:
      description: Mark the current patient done and move to the next.
      properties:
        clinician_id:
          anyOf:
          - exclusiveMinimum: 0.0
            type: integer
          - type: 'null'
          title: Clinician Id
        completed_patient_id:
          exclusiveMinimum: 0.0
          title: Completed Patient Id
          type: integer
      required:
      - completed_patient_id
      title: AdvanceRequest
      type: object
    AllergyWrite:
      description: 'An allergy (issue) list entry, appended as a new list row.


        ``title`` is the intake-derived allergen/substance string the physician

        confirms. ``begdate`` is a ``YYYY-MM-DD`` string, format-checked by the

        write verification step.'
      properties:
        begdate:
          description: Onset/entry date, YYYY-MM-DD.
          minLength: 1
          title: Begdate
          type: string
        reaction:
          anyOf:
          - type: string
          - type: 'null'
          description: Optional reaction description.
          title: Reaction
        title:
          minLength: 1
          title: Title
          type: string
      required:
      - title
      - begdate
      title: AllergyWrite
      type: object
    Body_upload_document_v1_documents_post:
      properties:
        clinician_id:
          anyOf:
          - exclusiveMinimum: 0.0
            type: integer
          - type: 'null'
          title: Clinician Id
        doc_type:
          default: lab_pdf
          title: Doc Type
          type: string
        file:
          description: The scanned lab PDF / intake form.
          format: binary
          title: File
          type: string
        patient_id:
          exclusiveMinimum: 0.0
          title: Patient Id
          type: integer
      required:
      - file
      - patient_id
      title: Body_upload_document_v1_documents_post
      type: object
    ChatRequest:
      description: 'One grounded question about a patient, optionally continuing a
        thread.


        ``clinician_id`` is optional: in ``disabled`` mode it identifies the acting

        clinician (as today); in ``smart`` mode the session cookie is authoritative

        and this field, if present, is only validated against it (mismatch → 403).'
      properties:
        clinician_id:
          anyOf:
          - exclusiveMinimum: 0.0
            type: integer
          - type: 'null'
          title: Clinician Id
        conversation_id:
          anyOf:
          - exclusiveMinimum: 0.0
            type: integer
          - type: 'null'
          title: Conversation Id
        correlation_id:
          anyOf:
          - type: string
          - type: 'null'
          title: Correlation Id
        document_ids:
          items:
            type: string
          title: Document Ids
          type: array
        message:
          minLength: 1
          title: Message
          type: string
        patient_id:
          exclusiveMinimum: 0.0
          title: Patient Id
          type: integer
      required:
      - patient_id
      - message
      title: ChatRequest
      type: object
    ClinicianId:
      description: OpenEMR user id — positive integer only.
      properties:
        value:
          exclusiveMinimum: 0.0
          title: Value
          type: integer
      required:
      - value
      title: ClinicianId
      type: object
    ConfirmRequest:
      description: 'The confirm transaction: the identical candidate echoed back verbatim.


        The candidate carries its own ``patient_id`` / ``clinician_id`` (parsed at
        the

        boundary by Pydantic) and ``idempotency_key``; the URL key must match it.


        ``candidate`` is the full ``AnyWriteCandidate`` union (``WriteCandidate``
        for

        the physician-direct vital/medication kinds, ``IssueWriteCandidate`` for the

        F4b agent-proposed medical_problem/allergy kinds), so an issue write can be

        confirmed over HTTP — the two candidate shapes are distinguished by their

        disjoint ``kind`` literals. The service''s ``commit`` already accepts the

        union.'
      properties:
        candidate:
          anyOf:
          - $ref: '#/components/schemas/WriteCandidate'
          - $ref: '#/components/schemas/IssueWriteCandidate'
          title: Candidate
      required:
      - candidate
      title: ConfirmRequest
      type: object
    HTTPValidationError:
      properties:
        detail:
          items:
            $ref: '#/components/schemas/ValidationError'
          title: Detail
          type: array
      title: HTTPValidationError
      type: object
    HealthResponse:
      properties:
        alive:
          default: true
          title: Alive
          type: boolean
        version:
          title: Version
          type: string
      required:
      - version
      title: HealthResponse
      type: object
    IssueWriteCandidate:
      description: 'A typed intake-derived issue write (medical problem / allergy)
        — F4b.


        The agent-proposed analogue of ``WriteCandidate``: same closed-surface

        discipline (exactly one payload matching ``kind``, client-generated

        ``idempotency_key``, typed principal ids), but over the issue kinds and

        defaulting to the strict ``agent_proposed_physician_confirmed`` entry mode.

        The agent may only *construct and propose* one of these; committing it

        requires the separate physician confirm transaction in

        ``writeback/service.py`` — the agent structurally cannot self-commit.


        ``source`` is the (document, fact) provenance the intake bridge populates
        —

        the link the spec requires from every derived fact back to the scanned page

        it was read off. It stays optional here (rather than required on the

        agent-proposed type) so the confirm route can still parse a candidate minted

        before this field existed, and so an issue write proposed by some future

        non-document path is expressible; ``None`` honestly means "no source

        document", never a fabricated one.'
      properties:
        allergy:
          anyOf:
          - $ref: '#/components/schemas/AllergyWrite'
          - type: 'null'
        clinician_id:
          $ref: '#/components/schemas/ClinicianId'
        entry_mode:
          $ref: '#/components/schemas/WriteEntryMode'
          default: agent_proposed_physician_confirmed
        idempotency_key:
          maxLength: 128
          minLength: 1
          title: Idempotency Key
          type: string
        kind:
          enum:
          - medical_problem
          - allergy
          title: Kind
          type: string
        medical_problem:
          anyOf:
          - $ref: '#/components/schemas/MedicalProblemWrite'
          - type: 'null'
        patient_id:
          $ref: '#/components/schemas/PatientId'
        source:
          anyOf:
          - $ref: '#/components/schemas/WriteSource'
          - type: 'null'
      required:
      - kind
      - patient_id
      - clinician_id
      - idempotency_key
      title: IssueWriteCandidate
      type: object
    JumpRequest:
      description: Reposition the round's cursor to a patient already on the list.
      properties:
        clinician_id:
          anyOf:
          - exclusiveMinimum: 0.0
            type: integer
          - type: 'null'
          title: Clinician Id
        patient_id:
          exclusiveMinimum: 0.0
          title: Patient Id
          type: integer
      required:
      - patient_id
      title: JumpRequest
      type: object
    MedicalProblemWrite:
      description: 'A medical-problem (issue) list entry, appended as a new list row.


        ``title`` is the intake-derived problem string the physician confirms —

        never free prose beyond it. ``begdate`` is a ``YYYY-MM-DD`` string (the

        Standard API''s format); its format is checked deterministically by the

        write verification step, not coerced here.'
      properties:
        begdate:
          description: Onset/entry date, YYYY-MM-DD.
          minLength: 1
          title: Begdate
          type: string
        diagnosis:
          anyOf:
          - type: string
          - type: 'null'
          description: Optional '<codetype>:<code>' association.
          title: Diagnosis
        title:
          minLength: 1
          title: Title
          type: string
      required:
      - title
      - begdate
      title: MedicalProblemWrite
      type: object
    MedicationWrite:
      description: 'A medication-list entry, appended as a new list row (latest-wins).


        ``title`` is a picked/echoed drug string, never free prose. ``begdate`` is
        a

        ``YYYY-MM-DD`` string (the Standard API''s format); its format is checked

        deterministically by the verifier, not coerced here.'
      properties:
        begdate:
          description: Start date, YYYY-MM-DD.
          minLength: 1
          title: Begdate
          type: string
        diagnosis:
          anyOf:
          - type: string
          - type: 'null'
          description: Optional '<codetype>:<code>' association.
          title: Diagnosis
        enddate:
          anyOf:
          - type: string
          - type: 'null'
          description: Optional end date, YYYY-MM-DD.
          title: Enddate
        title:
          minLength: 1
          title: Title
          type: string
      required:
      - title
      - begdate
      title: MedicationWrite
      type: object
    ObservationSeries:
      description: 'A patient''s readings for one metric, oldest→newest, each grounded.


        Orthogonal to the verified-claim contract: a lazily-fetched, patient-scoped

        series feeding a drill-down chart. An unknown/absent metric yields an empty

        ``points`` list (fail-closed), never a fabricated series.'
      properties:
        metric:
          title: Metric
          type: string
        patient_id:
          exclusiveMinimum: 0.0
          title: Patient Id
          type: integer
        points:
          items:
            $ref: '#/components/schemas/ObservationSeriesPoint'
          title: Points
          type: array
        reference_range:
          anyOf:
          - $ref: '#/components/schemas/ReferenceRange'
          - type: 'null'
        unit:
          default: ''
          title: Unit
          type: string
      required:
      - patient_id
      - metric
      title: ObservationSeries
      type: object
    ObservationSeriesPoint:
      description: 'One grounded reading in a metric time-series.


        Each point is independently auditable — ``resource_id`` locates the exact

        Observation, ``value`` is the verbatim source string (same discipline as a

        claim), and ``timestamp`` is the raw ISO instant from ``extract_temporal``

        (``effectiveDateTime`` → ``issued``). A point that cannot ground a value or

        a timestamp is dropped upstream, never fabricated.'
      properties:
        abnormal:
          default: ''
          description: Observation interpretation / OpenEMR abnormal flag; '' when
            normal/absent.
          title: Abnormal
          type: string
        resource_id:
          minLength: 1
          title: Resource Id
          type: string
        timestamp:
          description: Clinical instant, verbatim ISO string.
          minLength: 1
          title: Timestamp
          type: string
        value:
          description: Verbatim numeric value as a string, straight from source.
          title: Value
          type: string
      required:
      - resource_id
      - value
      - timestamp
      title: ObservationSeriesPoint
      type: object
    PatientId:
      description: OpenEMR patient PID — positive integer only.
      properties:
        value:
          exclusiveMinimum: 0.0
          title: Value
          type: integer
      required:
      - value
      title: PatientId
      type: object
    ProposeFromDocumentRequest:
      description: 'Identify the patient (and, in disabled mode, the acting clinician)
        for a

        document-driven batch proposal. The document itself is named in the path.


        ``clinician_id`` follows the same auth-mode contract as :class:`ProposeRequest`:

        it identifies the acting clinician in ``disabled`` mode and, in ``smart``
        mode,

        is only validated against the session cookie (mismatch → 403).'
      properties:
        clinician_id:
          anyOf:
          - exclusiveMinimum: 0.0
            type: integer
          - type: 'null'
          title: Clinician Id
        patient_id:
          exclusiveMinimum: 0.0
          title: Patient Id
          type: integer
      required:
      - patient_id
      title: ProposeFromDocumentRequest
      type: object
    ProposeRequest:
      description: 'A raw physician write request, parsed into a typed candidate server-side.


        ``metric``/``unit`` are required for a vital and ignored for a medication

        (whose ``raw_value`` is the picked/echoed drug title). No value is ever

        interpreted by a model — the deterministic parser owns it.


        ``clinician_id`` is optional: in ``disabled`` mode it identifies the acting

        clinician (as today); in ``smart`` mode the session cookie is authoritative

        and this field, if present, is only validated against it (mismatch → 403).'
      properties:
        clinician_id:
          anyOf:
          - exclusiveMinimum: 0.0
            type: integer
          - type: 'null'
          title: Clinician Id
        kind:
          $ref: '#/components/schemas/WriteKind'
        metric:
          anyOf:
          - type: string
          - type: 'null'
          title: Metric
        patient_id:
          exclusiveMinimum: 0.0
          title: Patient Id
          type: integer
        raw_value:
          minLength: 1
          title: Raw Value
          type: string
        unit:
          anyOf:
          - type: string
          - type: 'null'
          title: Unit
      required:
      - patient_id
      - kind
      - raw_value
      title: ProposeRequest
      type: object
    ReadinessDependency:
      description: 'One dependency''s status inside `/ready`.


        Graded, not boolean: alongside the ``ok`` gate, a derived ``status`` string

        distinguishes ``ok`` (serving), ``degraded`` (a non-gating/advisory

        dependency that is down but does not pull the service out of rotation), and

        ``down`` (a gating dependency that is unreachable). A graded readiness lets
        a

        dashboard tell "running in a reduced mode" apart from "not ready".'
      properties:
        advisory:
          default: false
          description: Advisory dependencies are reported for visibility but do not
            gate readiness — a failing advisory dep never turns /ready into 503.
          title: Advisory
          type: boolean
        detail:
          default: ''
          title: Detail
          type: string
        name:
          title: Name
          type: string
        ok:
          title: Ok
          type: boolean
        status:
          description: 'Derived grade: ``ok`` when healthy, ``degraded`` when a failing
            advisory

            dep, ``down`` when a failing gating dep.'
          readOnly: true
          title: Status
          type: string
      required:
      - name
      - ok
      - status
      title: ReadinessDependency
      type: object
    ReadinessResponse:
      properties:
        dependencies:
          items:
            $ref: '#/components/schemas/ReadinessDependency'
          title: Dependencies
          type: array
        ready:
          title: Ready
          type: boolean
      required:
      - ready
      - dependencies
      title: ReadinessResponse
      type: object
    ReferenceRange:
      description: 'A metric''s numeric reference bounds, each independently optional.


        Parsed from an Observation''s ``referenceRange[0]`` — ``null`` on the wire

        when neither bound is derivable, so the chart never invents a band.'
      properties:
        high:
          anyOf:
          - type: number
          - type: 'null'
          title: High
        low:
          anyOf:
          - type: number
          - type: 'null'
          title: Low
      title: ReferenceRange
      type: object
    RefreshRequest:
      description: 'Force a re-sync of one clinician''s active rounding list.


        ``clinician_id`` is optional: in ``disabled`` mode it identifies the acting

        clinician (as today); in ``smart`` mode the session cookie is authoritative

        and this field, if present, is only validated against it (mismatch → 403).'
      properties:
        clinician_id:
          anyOf:
          - exclusiveMinimum: 0.0
            type: integer
          - type: 'null'
          title: Clinician Id
      title: RefreshRequest
      type: object
    StartRequest:
      description: Begin a round for one clinician over an authorized patient list.
      properties:
        clinician_id:
          anyOf:
          - exclusiveMinimum: 0.0
            type: integer
          - type: 'null'
          title: Clinician Id
        patient_ids:
          items:
            type: integer
          minItems: 1
          title: Patient Ids
          type: array
      required:
      - patient_ids
      title: StartRequest
      type: object
    ValidationError:
      properties:
        loc:
          items:
            anyOf:
            - type: string
            - type: integer
          title: Location
          type: array
        msg:
          title: Message
          type: string
        type:
          title: Error Type
          type: string
      required:
      - loc
      - msg
      - type
      title: ValidationError
      type: object
    VitalWrite:
      description: 'A single-metric vital reading, appended as a new vitals form.


        ``value`` is already parsed to a number at the system boundary (parse, don''t

        validate): constructing a ``VitalWrite`` with a non-numeric value or an

        unknown metric fails here, which is the first deterministic gate. Semantic

        checks (unit-matches-metric, physiologic plausibility) are the verifier''s
        job.'
      properties:
        metric:
          $ref: '#/components/schemas/WritableMetric'
        unit:
          description: Physician-supplied unit; verified against the metric.
          minLength: 1
          title: Unit
          type: string
        value:
          title: Value
          type: number
      required:
      - metric
      - value
      - unit
      title: VitalWrite
      type: object
    WritableMetric:
      description: 'The closed set of vital-sign metrics a physician may write.


        Deliberately small: only OpenEMR''s Standard-API *vitals* columns are

        directly writable as Observation-like data (labs have no create endpoint —

        see the feasibility brief). Extend only with a matching column mapping in

        ``fhir/write_client.py`` and a plausibility spec in ``verification/writes.py``

        — the exhaustive ``match`` in each will fail to compile until you do.'
      enum:
      - heart_rate
      - spo2
      - systolic_bp
      - diastolic_bp
      - respiratory_rate
      - temperature
      - weight
      - height
      title: WritableMetric
      type: string
    WriteCandidate:
      description: 'A parsed, typed write request over the closed writable surface.


        Carries exactly one payload (``vital`` xor ``medication``) matching ``kind``.

        ``kind`` is deliberately the *direct* subset — the vital/medication verifier

        in ``verification/writes.py`` matches exhaustively over it; the issue kinds

        live on ``IssueWriteCandidate``. ``idempotency_key`` is client-generated so

        a retried/double-clicked confirm cannot create a duplicate record.

        ``patient_id`` / ``clinician_id`` scope the write; the route enforces

        ``is_authorized`` before a candidate is trusted.


        ``source`` is the optional (document, fact) provenance. It lives on the

        *candidate* rather than only on ``ProposedWrite`` because the candidate is

        the object that round-trips through the physician''s confirm request — the

        confirm body echoes it back verbatim, so this is the only place provenance

        can survive propose → confirm and still reach the ``write_committed`` audit

        row. It defaults to ``None``, leaving the physician-direct path untouched.'
      properties:
        clinician_id:
          $ref: '#/components/schemas/ClinicianId'
        entry_mode:
          $ref: '#/components/schemas/WriteEntryMode'
          default: human_direct
        idempotency_key:
          maxLength: 128
          minLength: 1
          title: Idempotency Key
          type: string
        kind:
          enum:
          - vital
          - medication
          title: Kind
          type: string
        medication:
          anyOf:
          - $ref: '#/components/schemas/MedicationWrite'
          - type: 'null'
        patient_id:
          $ref: '#/components/schemas/PatientId'
        source:
          anyOf:
          - $ref: '#/components/schemas/WriteSource'
          - type: 'null'
        vital:
          anyOf:
          - $ref: '#/components/schemas/VitalWrite'
          - type: 'null'
      required:
      - kind
      - patient_id
      - clinician_id
      - idempotency_key
      title: WriteCandidate
      type: object
    WriteEntryMode:
      description: 'How the value reached the record — the physician-attribution surface.


        ``human_direct`` is Phase 1: the physician typed the value themselves, so
        an

        out-of-range value is a soft, overridable warning.

        ``agent_proposed_physician_confirmed`` is the live agent path (F4b): the

        agent drafts a typed candidate, a *separate* physician confirm transaction

        commits it, and the audit row attributes the write to this mode. The write

        verifier treats it as the strict mode that hard-blocks out-of-range values.'
      enum:
      - human_direct
      - agent_proposed_physician_confirmed
      title: WriteEntryMode
      type: string
    WriteKind:
      description: 'What kind of record a candidate creates.


        ``vital`` / ``medication`` are the physician-direct kinds (Phase 1,

        ``WriteCandidate``); ``medical_problem`` / ``allergy`` are the

        intake-derived, agent-proposed kinds (F4b, ``IssueWriteCandidate``) that

        flow through the same propose→confirm gate but require an explicit

        physician confirm to commit.'
      enum:
      - vital
      - medication
      - medical_problem
      - allergy
      title: WriteKind
      type: string
    WriteSource:
      description: 'Where an agent-proposed write came from — its (document, fact)
        provenance.


        The write-side analogue of the read side''s ``DocumentCitation``: the spec

        requires every derived fact to link back to its source document, and the

        agent store already guarantees that internally (a NOT NULL FK chain

        ``extracted_fact.extraction_id → extraction.source_document_id →

        source_document``). This type is what carries that guarantee **across the

        OpenEMR write boundary**, where it was previously dropped: without it a

        physician-confirmed intake-derived allergy lands in OpenEMR as an untraceable

        record, with nothing tying it to the scanned page it was read off.


        Deliberately *optional* everywhere it appears (``… | None = None``): the

        physician-direct path (``entry_mode=human_direct``) has no source document,

        and a typed-in vital must stay expressible with no provenance at all. A

        ``WriteSource`` therefore means "this write descends from a document"; its

        absence means "a human typed this", and the two are never conflated.


        The ids are the agent store''s own row ids (``source_document.id`` /

        ``extracted_fact.id``), not OpenEMR ids — they are the durable end of the

        provenance chain, and they are what ``to_citation`` re-materializes.'
      properties:
        bbox:
          anyOf:
          - items:
              type: number
            type: array
          - type: 'null'
          description: Normalized [x, y, w, h] of the reconciled OCR span.
          title: Bbox
        confidence:
          anyOf:
          - type: number
          - type: 'null'
          description: OCR-reconciliation match confidence in [0, 1].
          title: Confidence
        extracted_fact_id:
          description: extracted_fact row id.
          exclusiveMinimum: 0.0
          title: Extracted Fact Id
          type: integer
        page_no:
          anyOf:
          - minimum: 1.0
            type: integer
          - type: 'null'
          description: 1-based page the fact was found on, when reconciled.
          title: Page No
        quote:
          description: Verbatim extracted value the write was derived from.
          minLength: 1
          title: Quote
          type: string
        source_document_id:
          description: source_document row id.
          exclusiveMinimum: 0.0
          title: Source Document Id
          type: integer
      required:
      - source_document_id
      - extracted_fact_id
      - quote
      title: WriteSource
      type: object
info:
  title: Clinical Co-Pilot
  version: 0.1.0
openapi: 3.1.0
paths:
  /health:
    get:
      operationId: health_health_get
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HealthResponse'
          description: Successful Response
      summary: Liveness — process is running
  /ready:
    get:
      operationId: ready_ready_get
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ReadinessResponse'
          description: ready
        '503':
          description: not ready
      summary: Readiness — all critical dependencies reachable
  /status:
    get:
      operationId: status_page_status_get
      responses:
        '200':
          content:
            application/json:
              schema:
                additionalProperties: true
                title: Response Status Page Status Get
                type: object
          description: Successful Response
      summary: Agent health aggregates (status page)
      tags:
      - status
  /v1/auth/callback:
    get:
      operationId: callback_v1_auth_callback_get
      responses:
        '200':
          content:
            application/json:
              schema: {}
          description: Successful Response
      summary: OAuth redirect target — exchange the code and set the session
      tags:
      - auth
  /v1/auth/login:
    get:
      operationId: login_v1_auth_login_get
      responses:
        '200':
          content:
            application/json:
              schema: {}
          description: Successful Response
      summary: Begin per-physician SMART login (redirect to OpenEMR)
      tags:
      - auth
  /v1/auth/logout:
    post:
      operationId: logout_v1_auth_logout_post
      responses:
        '204':
          description: Successful Response
      summary: Revoke the session and clear the cookie
      tags:
      - auth
  /v1/auth/me:
    get:
      operationId: me_v1_auth_me_get
      responses:
        '200':
          content:
            application/json:
              schema: {}
          description: Successful Response
      summary: Current physician identity for the session cookie
      tags:
      - auth
  /v1/auth/status:
    get:
      description: 'Report the deployment''s ``auth_mode`` and whether this request
        is authed.


        UNAUTHENTICATED and never errors: the SPA calls it on load to decide whether

        to show the login gate. ``authenticated`` is true only when ``auth_mode``
        is

        ``smart`` AND the session cookie resolves to a live session. Any failure while

        resolving is swallowed and reported as ``authenticated: false`` (fail-closed),

        never leaking why.'
      operationId: status_v1_auth_status_get
      responses:
        '200':
          content:
            application/json:
              schema:
                additionalProperties: true
                title: Response Status V1 Auth Status Get
                type: object
          description: Successful Response
      summary: Unauthenticated auth-mode + session probe for the SPA
      tags:
      - auth
  /v1/chat:
    post:
      operationId: chat_v1_chat_post
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ChatRequest'
        required: true
      responses:
        '200':
          content:
            application/json:
              schema:
                additionalProperties: true
                title: Response Chat V1 Chat Post
                type: object
          description: Successful Response
        '422':
